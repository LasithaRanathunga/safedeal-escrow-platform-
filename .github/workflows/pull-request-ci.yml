name: pull-request-ci.yml

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  server-ci:
    name: Server CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "lassi@sql"
          POSTGRES_DB: safedeal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d safedeal_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:lassi@sql@localhost:5432/safedeal_test
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: server/

  client-ci:
    name: Client CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build check
        env:
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_SERVER_BASE_URL: ${{ secrets.VITE_SERVER_BASE_URL_DEV }}
        run: npm run build

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: client/

  build-images-and-client:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          tags: lasitharanathunga98/safedeal:pr-${{ github.event.pull_request.number }}
          load: true

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lasitharanathunga98/safedeal:pr-${{ github.event.pull_request.number }}
          severity-threshold: HIGH
          exit-code: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push backend image
        run: docker push lasitharanathunga98/safedeal:pr-${{ github.event.pull_request.number }}

      - name: Build frontend
        env:
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_SERVER_BASE_URL: /api
        run: |
          cd client
          npm ci
          npm run build

      - name: Copy frontend build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_PUBPIC_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY}}
          source: "client/dist/*"
          target: "/app/pr-envs/pr-${{ github.event.pull_request.number }}/frontend"
          strip_components: 2

  deploy-pr:
    name: Deploy PR Environment
    runs-on: ubuntu-latest
    needs: build-images-and-client

    steps:
      - name: Deploy PR Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBPIC_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            bash /app/scripts/deploy-pr.sh ${{ github.event.pull_request.number }} ${{ secrets.EC2_PUBPIC_IP }}

      - name: Print Preview URL
        run: |

          URL="http://pr_${{ github.event.pull_request.number }}.${{ secrets.EC2_PUBPIC_IP }}.nip.io"

          echo "Preview URL: $URL"
